# Run from the monorepo root: docker compose -f backend/docker-compose.yml up
services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - '${PORT:-3000}:3000'
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codeiron
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
